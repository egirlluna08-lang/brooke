<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bratty Brooke</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(20, 30, 50, 0.8);
            border: 2px solid #ff1493;
            border-radius: 16px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 20, 147, 0.3);
        }

        .profile {
            margin-bottom: 30px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #ff1493;
            margin: 0 auto 20px;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.4);
        }

        .profile h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile p {
            color: #ff1493;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: block;
            padding: 14px 24px;
            background: #ff1493;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .link-btn:hover {
            background: #ff69b4;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 20, 147, 0.5);
        }

        .link-btn:active {
            transform: translateY(0);
        }

        .dropdown {
            position: relative;
            width: 100%;
        }

        .dropdown-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dropdown-toggle .arrow {
            font-size: 12px;
            transition: transform 0.3s;
        }

        .dropdown-toggle.open .arrow {
            transform: rotate(180deg);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: rgba(20, 30, 50, 0.95);
            min-width: 100%;
            border: 2px solid #ff1493;
            border-radius: 8px;
            padding: 12px 0;
            z-index: 1000;
            top: 100%;
            margin-top: 8px;
            box-shadow: 0 8px 24px rgba(255, 20, 147, 0.3);
        }

        .dropdown-content.show {
            display: block;
        }

        .crypto-option {
            color: #fff;
            padding: 12px 16px;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255, 20, 147, 0.2);
        }

        .crypto-option:last-child {
            border-bottom: none;
        }

        .crypto-option:hover {
            background-color: rgba(255, 20, 147, 0.1);
        }

        .crypto-name {
            color: #fff;
            font-weight: 600;
        }

        .copy-btn {
            background: none;
            border: none;
            color: #ff1493;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
            font-weight: 600;
        }

        .copy-btn:hover {
            background: rgba(255, 20, 147, 0.2);
        }

        .footer {
            color: #888;
            font-size: 12px;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .profile h1 {
                font-size: 24px;
            }

            .link-btn {
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <div class="profile-img" style="background-image: url('pfp.jpg');"></div>
            <h1>Bratty Brooke</h1>
            <p>| 19 | Findom princess {bratty manipulative}</p>
        </div>

        <div class="links">
            <a href="https://throne.com/brattybbrooke" class="link-btn">Throne</a>
            
            <div class="dropdown">
                <button class="link-btn dropdown-toggle" id="cryptoBtn">
                    <span>Crypto</span>
                    <span class="arrow">▼</span>
                </button>
                <div class="dropdown-content" id="cryptoDropdown">
                    <div class="crypto-option" onclick="copyAddress('5CXkhpd1v2A7qxi1S7augNzSUdqzYH9RDfhXq9T5RXRW', this)">
                        <span class="crypto-name">Solana (SOL)</span>
                        <button class="copy-btn">copy</button>
                    </div>
                    <div class="crypto-option" onclick="copyAddress('0xde1Ecd6b162c0b20DE2Adc421a12c6363027dD4F', this)">
                        <span class="crypto-name">Ethereum (ETH)</span>
                        <button class="copy-btn">copy</button>
                    </div>
                    <div class="crypto-option" onclick="copyAddress('bc1qwur8t4ha8tmz8zl2naawk3kjkh40hs93afsesy', this)">
                        <span class="crypto-name">Bitcoin (BTC)</span>
                        <button class="copy-btn">copy</button>
                    </div>
                </div>
            </div>

            <button class="link-btn" id="paypalBtn" style="background: rgba(255, 20, 147, 0.2); border: 2px solid #ff1493; color: #ff1493;" onclick="copyPaypal(this)">PayPal</button>

            <a href="https://sent.bio/brattybrooke" target="_blank" class="link-btn" style="background: rgba(255, 20, 147, 0.2); border: 2px solid #ff1493; color: #ff1493;">sent.bio</a>
        </div>

        <div class="footer">
            All links managed by Bratty Brooke
        </div>
    </div>

    <script>
        const cryptoBtn = document.getElementById('cryptoBtn');
        const cryptoDropdown = document.getElementById('cryptoDropdown');

        cryptoBtn.addEventListener('click', function(e) {
            e.preventDefault();
            cryptoDropdown.classList.toggle('show');
            cryptoBtn.classList.toggle('open');
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown')) {
                cryptoDropdown.classList.remove('show');
                cryptoBtn.classList.remove('open');
            }
        });

        function copyAddress(address, element) {
            navigator.clipboard.writeText(address).then(function() {
                const btn = element.querySelector('.copy-btn');
                const originalText = btn.innerText;
                btn.innerText = '✓ copied';
                setTimeout(() => {
                    btn.innerText = originalText;
                }, 2000);
            }).catch(function(err) {
                alert('Failed to copy');
            });
        }

        function copyPaypal(button) {
            const email = 'Realbrattybrooke@gmail.com';
            navigator.clipboard.writeText(email).then(function() {
                const originalText = button.innerText;
                button.innerText = '✓ copied';
                setTimeout(() => {
                    button.innerText = originalText;
                }, 2000);
            }).catch(function(err) {
                alert('Failed to copy');
            });
        }

    </script>
</body>
</html>
