<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bratty Brooke</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1a2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .profile {
            margin-bottom: 40px;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d41159, #8b0000);
            border: 4px solid #d41159;
            margin: 0 auto 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
        }

        .profile h1 {
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile p {
            color: #d41159;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: block;
            padding: 16px 24px;
            background: linear-gradient(135deg, #d41159, #b00d47);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .link-btn:hover {
            background: linear-gradient(135deg, #b00d47, #8b0000);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212, 17, 89, 0.4);
        }

        .link-btn:active {
            transform: translateY(0);
        }

        .link-btn.secondary {
            background: rgba(212, 17, 89, 0.1);
            color: #d41159;
            border: 2px solid #d41159;
        }

        .link-btn.secondary:hover {
            background: rgba(212, 17, 89, 0.2);
            box-shadow: 0 8px 24px rgba(212, 17, 89, 0.2);
        }

        @media (max-width: 480px) {
            .profile h1 {
                font-size: 28px;
            }

            .link-btn {
                padding: 14px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <div class="profile-img">👑</div>
            <h1>Bratty Brooke</h1>
            <p>Exclusive Content</p>
        </div>

        <div class="links">
            <a href="https://throne.com/brattybbrooke" class="link-btn">Throne</a>
            <a href="https://sent.bio/brattybrooke" class="link-btn secondary">sent.bio</a>
        </div>
    </div>
</body>
</html>
